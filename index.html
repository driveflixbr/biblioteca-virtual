<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Streamverse — Arquivo</title>
<meta name="description" content="Um arquivo de streaming leve, apenas em texto. Navegue por plataformas, filmes e séries." />
<style>
  :root {
    --bg: #0b0b0b;
    --bg-elev: #141414;
    --bg-elev-2: #1f1f1f;
    --border: #2a2a2a;
    --text: #f5f5f5;
    --text-dim: #a3a3a3;
    --text-mute: #6b6b6b;
    --accent: #e50914;
    --accent-hover: #f6121d;
    --radius: 10px;
    --shadow: 0 10px 30px rgba(0,0,0,.5);
    --transition: 200ms cubic-bezier(.2,.7,.2,1);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body.modal-open { overflow: hidden; }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(11,11,11,.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logo {
    font-weight: 800;
    font-size: 22px;
    letter-spacing: .5px;
    color: var(--accent);
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
  }
  .logo span { color: var(--text); }

  .breadcrumb {
    flex: 1;
    color: var(--text-dim);
    font-size: 14px;
    min-width: 120px;
  }
  .breadcrumb .crumb {
    cursor: pointer;
    transition: color var(--transition);
  }
  .breadcrumb .crumb:hover { color: var(--text); }
  .breadcrumb .sep { margin: 0 8px; color: var(--text-mute); }
  .breadcrumb .current { color: var(--text); font-weight: 600; }

  .search-wrap {
    position: relative;
    flex: 0 1 280px;
  }
  .search-wrap.hidden { display: none; }
  .search-input {
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px 10px 38px;
    border-radius: var(--radius);
    font-size: 14px;
    outline: none;
    transition: border-color var(--transition), background var(--transition);
  }
  .search-input::placeholder { color: var(--text-mute); }
  .search-input:focus {
    border-color: var(--accent);
    background: var(--bg-elev-2);
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-mute);
    pointer-events: none;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .page-title {
    font-size: clamp(28px, 4vw, 40px);
    margin: 0 0 8px;
    font-weight: 800;
    letter-spacing: -.5px;
  }
  .page-subtitle {
    color: var(--text-dim);
    margin: 0 0 32px;
    font-size: 15px;
  }

  /* Type selector */
  .type-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 560px;
    margin: 0 auto;
  }
  .type-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 42px 24px;
    cursor: pointer;
    text-align: center;
    transition: all var(--transition);
    color: var(--text);
    font-family: inherit;
  }
  .type-card:hover {
    background: var(--bg-elev-2);
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: var(--shadow);
  }
  .type-card .label {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .type-card .count {
    color: var(--text-mute);
    font-size: 14px;
  }

  /* Title list */
  .letter-group { margin-bottom: 36px; }
  .letter-heading {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin: 0 0 16px;
    padding: 8px 16px 8px 14px;
    background: linear-gradient(90deg, rgba(229,9,20,.18), rgba(229,9,20,0));
    border-left: 4px solid var(--accent);
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .letter-heading .count-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-mute);
    background: var(--bg-elev-2);
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: .5px;
  }
  .titles {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
    align-items: stretch;
  }
  .title-item {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    cursor: pointer;
    color: var(--text);
    text-align: left;
    transition: transform 220ms cubic-bezier(.2,.7,.2,1),
                background 220ms ease,
                border-color 220ms ease,
                box-shadow 220ms ease;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 64px;
  }
  .title-item .t-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }
  .title-item .t-meta {
    font-size: 12px;
    color: var(--text-mute);
    font-weight: 500;
    letter-spacing: .3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .title-item .t-meta .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text-mute);
    display: inline-block;
  }
  .title-item:hover {
    background: var(--bg-elev-2);
    border-color: var(--accent);
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 8px 24px rgba(229,9,20,.15);
  }
  .title-item:hover .t-name { color: var(--accent); }
  .title-item:hover .t-meta { color: var(--text-dim); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-mute);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* Back button */
  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 24px;
    transition: all var(--transition);
    font-family: inherit;
  }
  .back-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.92);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 200ms ease;
  }
  .modal.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-content {
    width: 100%;
    max-width: 1100px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: slideUp 250ms cubic-bezier(.2,.7,.2,1);
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .modal-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    font-family: inherit;
  }
  .icon-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
  }
  .video-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* Animations */
  .view {
    animation: viewIn 250ms ease;
  }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .header-inner { padding: 14px 16px; gap: 12px; }
    .breadcrumb { order: 3; flex-basis: 100%; }
    .search-wrap { flex: 1; }
    main { padding: 24px 16px 60px; }
    .type-list { grid-template-columns: 1fr; }
    .modal { padding: 0; }
    .modal-content { border-radius: 0; height: 100%; display: flex; flex-direction: column; }
    .video-wrap { flex: 1; aspect-ratio: auto; }
  }

  /* Source selection modal */
  .source-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 150;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 180ms ease;
  }
  .source-modal.open { display: flex; }
  .source-card {
    width: 100%;
    max-width: 380px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px 24px 22px;
    box-shadow: var(--shadow);
    animation: sourcePop 220ms cubic-bezier(.2,.7,.2,1);
    text-align: center;
  }
  @keyframes sourcePop {
    from { transform: translateY(12px) scale(.96); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .source-eyebrow {
    color: var(--text-mute);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 0 0 6px;
  }
  .source-title {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 18px;
    color: var(--text);
    word-break: break-word;
  }
  .source-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .source-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-elev-2);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
  }
  .source-btn:hover {
    border-color: var(--accent);
    background: #262626;
    transform: translateY(-1px);
  }
  .source-btn.drive:hover { color: #4285f4; }
  .source-btn.telegram:hover { color: #29b6f6; }
  .source-cancel {
    margin-top: 14px;
    background: transparent;
    border: none;
    color: var(--text-mute);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: color var(--transition);
  }
  .source-cancel:hover { color: var(--text); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    z-index: 200;
    transition: transform 250ms cubic-bezier(.2,.7,.2,1);
    box-shadow: var(--shadow);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo" id="logo">DRIVEFLIX<span>BR</span></div>
      <nav class="breadcrumb" id="breadcrumb" aria-label="Navegação"></nav>
      <div class="search-wrap hidden" id="searchWrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        </span>
        <input id="search" class="search-input" type="text" placeholder="Pesquisar..." aria-label="Buscar títulos" />
      </div>
    </div>
  </header>

  <main id="app"></main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Título</h3>
        <div class="modal-actions">
          <button class="icon-btn" id="copyBtn" title="Copiar link" aria-label="Copiar link do vídeo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>
          </button>
          <button class="icon-btn" id="closeBtn" title="Fechar" aria-label="Fechar player">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
          </button>
        </div>
      </div>
      <div class="video-wrap">
        <iframe id="player" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <div class="source-modal" id="sourceModal" role="dialog" aria-modal="true" aria-labelledby="sourceTitle">
    <div class="source-card">
      <p class="source-eyebrow">Escolha a fonte</p>
      <h3 class="source-title" id="sourceTitle">Título</h3>
      <div class="source-buttons">
        <button class="source-btn drive" id="sourceDrive">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"/><path d="m4.93 10.93 4.24 4.24"/><path d="M2 18h6"/><path d="M16 18h6"/><path d="m14.83 15.17 4.24-4.24"/><path d="M8 22h8"/><circle cx="12" cy="14" r="2"/></svg>
          Google Drive
        </button>
        <button class="source-btn telegram" id="sourceTelegram">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7Z"/><path d="M22 2 11 13"/></svg>
          Telegram
        </button>
      </div>
      <button class="source-cancel" id="sourceCancel">Cancelar</button>
    </div>
  </div>

  <div class="toast" id="toast">Link copiado</div>

<script>
/* =========================================================
   DATA — Servidor Único
   ========================================================= */
const SERVER_DATA = {
  name: "Catálogo Principal",
  movies: [
    { title: "Avatar", year: 2009, links: { drive: "https://drive.google.com/file/d/avatar", telegram: "https://t.me/streamverse/avatar" } },
    { title: "Vingadores", year: 2012, links: { drive: "https://drive.google.com/file/d/avengers", telegram: "https://t.me/streamverse/avengers" } },
    { title: "Batman", year: 2022, link: "https://drive.google.com/file/d/batman" },
    { title: "Blade Runner 2049", year: 2017, links: { drive: "https://drive.google.com/file/d/blade-runner", telegram: "https://t.me/streamverse/blade-runner" } },
    { title: "Duna", year: 2021, links: { telegram: "https://t.me/streamverse/dune" } },
    { title: "A Origem", year: 2010, links: { drive: "https://drive.google.com/file/d/inception", telegram: "https://t.me/streamverse/inception" } },
    { title: "Interestelar", year: 2014, links: { drive: "https://drive.google.com/file/d/interstellar", telegram: "https://t.me/streamverse/interstellar" } }
  ],
  series: [
    { title: "The Walking Dead", year: 2011, links: { drive: "https://drive.google.com/file/d/avatar", telegram: "https://4br.me/oxHlisVH6q" } },
    { title: "Black Mirror", year: 2011, seasons: 6, link: "https://example.com/embed/black-mirror" },
    { title: "Breaking Bad", year: 2008, seasons: 5, link: "https://example.com/embed/breaking-bad" },
    { title: "Stranger Things", year: 2016, seasons: 4, link: "https://example.com/embed/stranger-things" },
    { title: "The Last of Us", year: 2023, seasons: 2, link: "https://example.com/embed/last-of-us" }
  ]
};

/* =========================================================
   ESTADO
   ========================================================= */
const state = {
  view: "types", // Começa direto na seleção de Filmes/Séries
  type: null,    
  search: ""
};

const app = document.getElementById("app");
const breadcrumb = document.getElementById("breadcrumb");
const searchWrap = document.getElementById("searchWrap");
const searchInput = document.getElementById("search");
const modal = document.getElementById("modal");
const player = document.getElementById("player");
const modalTitle = document.getElementById("modalTitle");
const closeBtn = document.getElementById("closeBtn");
const copyBtn = document.getElementById("copyBtn");
const logo = document.getElementById("logo");
const toast = document.getElementById("toast");

let currentLink = "";

/* =========================================================
   RENDERIZAÇÃO
   ========================================================= */
function render() {
  app.innerHTML = "";
  renderBreadcrumb();
  toggleSearch();

  if (state.view === "types") return renderTypes();
  if (state.view === "titles") return renderTitles();
}

function renderBreadcrumb() {
  const parts = [];
  parts.push(`<span class="crumb" data-nav="types">Início</span>`);
  
  if (state.type) {
    parts.push(`<span class="sep">/</span>`);
    parts.push(`<span class="current">${state.type === "movies" ? "Filmes" : "Séries"}</span>`);
  }
  
  breadcrumb.innerHTML = parts.join("");
  breadcrumb.querySelectorAll(".crumb").forEach(el => {
    el.addEventListener("click", () => {
      goHome();
    });
  });
}

function toggleSearch() {
  if (state.view === "titles") {
    searchWrap.classList.remove("hidden");
  } else {
    searchWrap.classList.add("hidden");
    searchInput.value = "";
    state.search = "";
  }
}

function renderTypes() {
  const view = document.createElement("div");
  view.className = "view";
  view.innerHTML = `
    <h1 class="page-title">Bem-vindo ao Arquivo</h1>
    <p class="page-subtitle">O que você gostaria de assistir hoje?</p>
    <div class="type-list">
      <button class="type-card" data-type="movies">
        <div class="label">Filmes</div>
        <div class="count">${SERVER_DATA.movies.length} títulos</div>
      </button>
      <button class="type-card" data-type="series">
        <div class="label">Séries</div>
        <div class="count">${SERVER_DATA.series.length} títulos</div>
      </button>
    </div>
  `;
  app.appendChild(view);

  view.querySelectorAll(".type-card").forEach(card => {
    card.addEventListener("click", () => goTitles(card.dataset.type));
  });
}

function renderTitles() {
  const items = SERVER_DATA[state.type] || [];
  const view = document.createElement("div");
  view.className = "view";
  view.innerHTML = `
    <button class="back-btn" id="backBtn">← Voltar</button>
    <h1 class="page-title">${state.type === "movies" ? "Filmes" : "Séries"}</h1>
    <p class="page-subtitle">${items.length} título${items.length === 1 ? "" : "s"} encontrados no servidor.</p>
    <div id="titleArea"></div>
  `;
  app.appendChild(view);

  view.querySelector("#backBtn").addEventListener("click", goHome);
  renderTitleList(items);
}

function renderTitleList(items) {
  const area = document.getElementById("titleArea");
  if (!area) return;
  const query = state.search.trim().toLowerCase();
  const filtered = query
    ? items.filter(i => i.title.toLowerCase().includes(query))
    : items.slice();

  filtered.sort((a, b) => a.title.localeCompare(b.title));

  if (filtered.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="icon">∅</div>
        <p>Nenhum título corresponde a "<strong>${escapeHtml(state.search)}</strong>".</p>
      </div>
    `;
    return;
  }

  const groups = {};
  filtered.forEach(item => {
    const ch = item.title.charAt(0).toUpperCase();
    const letter = /[A-Z]/.test(ch) ? ch : "#";
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(item);
  });

  const letters = Object.keys(groups).sort();
  area.innerHTML = letters.map(letter => `
    <section class="letter-group">
      <h2 class="letter-heading">
        <span>${letter}</span>
        <span class="count-badge">${groups[letter].length}</span>
      </h2>
      <div class="titles">
        ${groups[letter].map(item => {
          const idx = filtered.indexOf(item);
          const metaParts = [];
          if (item.year) metaParts.push(`<span>${item.year}</span>`);
          if (typeof item.seasons === "number") {
            metaParts.push(`<span class="dot"></span>`);
            metaParts.push(`<span>${item.seasons} temporada${item.seasons === 1 ? "" : "s"}</span>`);
          }
          const metaHtml = metaParts.length
            ? `<span class="t-meta">${metaParts.join("")}</span>`
            : "";
          return `
          <button class="title-item" data-idx="${idx}">
            <span class="t-name">${escapeHtml(item.title)}</span>
            ${metaHtml}
          </button>
        `;
        }).join("")}
      </div>
    </section>
  `).join("");

  area.querySelectorAll(".title-item").forEach(btn => {
    btn.addEventListener("click", () => {
      const item = filtered[parseInt(btn.dataset.idx, 10)];
      if (item) handleTitleClick(item);
    });
  });
}

/* =========================================================
   LÓGICA DE LINKS E MODAIS
   ========================================================= */
function getSources(item) {
  const out = [];
  if (item && item.links) {
    if (item.links.drive) out.push({ kind: "drive", url: item.links.drive });
    if (item.links.telegram) out.push({ kind: "telegram", url: item.links.telegram });
  }
  if (item && item.link && out.length === 0) {
    out.push({ kind: "drive", url: item.link });
  }
  return out;
}

function handleTitleClick(item) {
  const sources = getSources(item);
  if (sources.length === 0) return;
  if (sources.length === 1) {
    window.open(sources[0].url, "_blank", "noopener,noreferrer");
    return;
  }
  openSourceModal(item, sources);
}

function goHome() {
  state.view = "types";
  state.type = null;
  state.search = "";
  render();
}
function goTitles(type) {
  state.view = "titles";
  state.type = type;
  render();
}

/* MODAL DE SELEÇÃO DE FONTE */
const sourceModal = document.getElementById("sourceModal");
const sourceTitleEl = document.getElementById("sourceTitle");
const sourceDriveBtn = document.getElementById("sourceDrive");
const sourceTelegramBtn = document.getElementById("sourceTelegram");
const sourceCancelBtn = document.getElementById("sourceCancel");

let activeSources = { drive: null, telegram: null };

function openSourceModal(item, sources) {
  activeSources = { drive: null, telegram: null };
  sources.forEach(s => { activeSources[s.kind] = s.url; });
  sourceTitleEl.textContent = item.title;
  sourceDriveBtn.style.display = activeSources.drive ? "" : "none";
  sourceTelegramBtn.style.display = activeSources.telegram ? "" : "none";
  sourceModal.classList.add("open");
  document.body.classList.add("modal-open");
}
function closeSourceModal() {
  sourceModal.classList.remove("remove");
  sourceModal.classList.remove("open");
  document.body.classList.remove("modal-open");
}

sourceDriveBtn.addEventListener("click", () => {
  if (activeSources.drive) window.open(activeSources.drive, "_blank");
  closeSourceModal();
});
sourceTelegramBtn.addEventListener("click", () => {
  if (activeSources.telegram) window.open(activeSources.telegram, "_blank");
  closeSourceModal();
});
sourceCancelBtn.addEventListener("click", closeSourceModal);

/* PLAYER MODAL (OPCIONAL SE USAR EMBED) */
function closeModal() {
  modal.classList.remove("open");
  player.src = "";
  document.body.classList.remove("modal-open");
}
closeBtn.addEventListener("click", closeModal);

/* BUSCA */
searchInput.addEventListener("input", (e) => {
  state.search = e.target.value;
  if (state.view === "titles") {
    renderTitleList(SERVER_DATA[state.type]);
  }
});

logo.addEventListener("click", goHome);

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[m]));
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
}

render();
</script>
</body>
</html>
